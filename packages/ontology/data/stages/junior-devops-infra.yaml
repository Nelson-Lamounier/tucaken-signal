stage: junior
archetype: devops_infra
priority_sections: [hero, getting_started, deployment, ai_usage]
priority_artifacts: [readme_demo_block, runbook]
required_pillars: [production_reality, readability]
stage_specific_suggestions:
  - id: what_does_this_run
    pillar: readability
    title: "Open with what this infra runs and where"
    description: >
      Infra repos without context look like config dumps. One sentence
      (\"runs the Y service on EKS in eu-west-1\") fixes it.
    trigger: any
    impact: 0.85
    effort: 0.1
  - id: learning_journey_doc
    pillar: readability
    title: "Add a 'What I Learned' section to the README"
    description: >
      Juniors-specific signal validated in 2026 portfolio advice
      (DEV.to / Hashnode / r/cscareerquestions): document the
      problems you hit and what you'd do differently. Converts a
      project from "thing I built" into "evidence of how I think".
    trigger: any
    impact: 0.7
    effort: 0.15
