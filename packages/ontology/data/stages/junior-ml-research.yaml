stage: junior
archetype: ml_research
priority_sections: [hero, data, methodology, results, reproducibility, ai_usage]
priority_artifacts: [notebook_index, readme_results_block]
required_pillars: [authenticity, readability]
stage_specific_suggestions:
  - id: add_results_block
    pillar: readability
    title: "Add a one-table or one-chart Results block to the README"
    description: >
      ML repos without results read as coursework. One headline metric
      makes the work legible.
    trigger: any
    impact: 0.9
    effort: 0.3
  - id: ai_transparency_section
    pillar: authenticity
    title: "Add an AI Usage section"
    description: >
      For ML work in 2026, AI-tool disclosure (Copilot, code-gen,
      doc-gen) is a credibility signal.
    trigger: ai_fingerprints_detected_or_recent
    impact: 0.7
    effort: 0.2
  - id: learning_journey_doc
    pillar: readability
    title: "Add a 'What I Learned' section to the README"
    description: >
      Juniors-specific signal validated in 2026 portfolio advice
      (DEV.to / Hashnode / r/cscareerquestions): document the
      problems you hit and what you'd do differently. Converts a
      project from "thing I built" into "evidence of how I think".
    trigger: any
    impact: 0.7
    effort: 0.15
