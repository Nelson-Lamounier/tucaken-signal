stage: senior
archetype: production_saas

priority_sections:
  - architecture
  - design_decisions
  - deployment
  - operational_practices
  - postmortems_or_incidents

priority_artifacts:
  - adrs
  - runbook
  - rfc_documents

required_pillars:
  - system_thinking
  - production_reality

stage_specific_suggestions:
  - id: adr_backfill
    pillar: system_thinking
    title: "Document your architectural decisions retroactively"
    description: >
      Code shows X, Y, Z choices. Senior interviews probe the reasoning
      behind these. Make it visible now.
    trigger: significant_architectural_choices_detected_and_no_adrs
    impact: 0.95
    effort: 0.5
  - id: postmortem_invitation
    pillar: production_reality
    title: "Surface a debugging or incident story"
    description: >
      Senior engineers are evaluated on failure handling. A postmortem or
      lessons-learned section signals operational maturity.
    trigger: has_bug_fix_or_revert_commits
    impact: 0.85
    effort: 0.4
