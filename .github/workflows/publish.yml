# =============================================================================
# Publish to npm — monorepo, 3 packages in dependency order
# =============================================================================
#
# Uses `yarn npm publish` (yarn 4) which rewrites `workspace:*` deps to the
# actual version. Plain `npm publish` ships workspace:* through unchanged
# and `npm install -g` then fails with EUNSUPPORTEDPROTOCOL.
#
# Trigger: push a tag matching `v*` OR workflow_dispatch.
# Security: no user-controlled inputs in run: steps.
# Secrets: NPM_TOKEN (set on the npm-publish environment).
# =============================================================================

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: 'Publish @tucaken/* to npm'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node + npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (yarn 4)
        run: yarn install --immutable

      - name: Build all packages
        run: yarn build

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      # ----- Publish in dependency order -----
      # `yarn npm publish` rewrites workspace:* → real version before pack.
      # YARN_NPM_AUTH_TOKEN auths yarn 4 against the registry.

      - name: Publish @tucaken/ontology
        working-directory: packages/ontology
        run: yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tucaken/signal-cli
        working-directory: packages/signal-cli
        run: yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tucaken/signal-mcp
        working-directory: packages/mcp-server
        run: yarn npm publish --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Summary
        env:
          PKG_JSON_PATH: packages/signal-cli/package.json
        run: |
          VERSION=$(node -p "require('./${PKG_JSON_PATH}').version")
          {
            echo "## npm publish — v${VERSION}"
            echo ""
            echo "| Package | Version | Status |"
            echo "|---|---|---|"
            echo "| @tucaken/ontology | ${VERSION} | ok |"
            echo "| @tucaken/signal-cli | ${VERSION} | ok |"
            echo "| @tucaken/signal-mcp | ${VERSION} | ok |"
            echo ""
            echo "Install: \`npm install -g @tucaken/signal-cli\`"
          } >> "$GITHUB_STEP_SUMMARY"
