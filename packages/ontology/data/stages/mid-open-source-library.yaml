stage: mid
archetype: open_source_library
priority_sections: [hero, installation, usage, api_reference, contributing]
priority_artifacts: [readme_install_block, license_file, changelog_file]
required_pillars: [readability, authenticity]
stage_specific_suggestions:
  - id: add_usage_example
    pillar: readability
    title: "Add a runnable Usage example above the fold"
    description: >
      Library consumers decide adoption from the first code block. Make
      the smallest useful example the first thing they see.
    trigger: no_usage_block
    impact: 0.85
    effort: 0.2
  - id: add_changelog
    pillar: readability
    title: "Add a CHANGELOG.md"
    description: >
      Library maturity is signaled by a CHANGELOG. Even a thin one beats none.
    trigger: no_changelog
    impact: 0.5
    effort: 0.15
