stage: junior
archetype: static_site
priority_sections: [hero, getting_started, ai_usage]
priority_artifacts: [readme_demo_link]
required_pillars: [readability]
stage_specific_suggestions:
  - id: demo_link
    pillar: readability
    title: "Put the live site URL above the fold"
    description: >
      Static-site repo without a link is just markdown. The URL is
      the artifact.
    trigger: any
    impact: 0.9
    effort: 0.1
  - id: learning_journey_doc
    pillar: readability
    title: "Add a 'What I Learned' section to the README"
    description: >
      Juniors-specific signal validated in 2026 portfolio advice
      (DEV.to / Hashnode / r/cscareerquestions): document the
      problems you hit and what you'd do differently. Converts a
      project from "thing I built" into "evidence of how I think".
    trigger: any
    impact: 0.7
    effort: 0.15
