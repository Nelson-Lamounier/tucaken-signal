stage: junior
archetype: monorepo
priority_sections: [hero, packages_overview, getting_started, ai_usage]
priority_artifacts: [package_map]
required_pillars: [readability, authenticity]
stage_specific_suggestions:
  - id: packages_map
    pillar: readability
    title: "Add a 'Packages' table (one line per workspace)"
    description: >
      Monorepos read as mazes without a map. One line per package
      converts opacity into navigation.
    trigger: any
    impact: 0.9
    effort: 0.2
  - id: learning_journey_doc
    pillar: readability
    title: "Add a 'What I Learned' section to the README"
    description: >
      Juniors-specific signal validated in 2026 portfolio advice
      (DEV.to / Hashnode / r/cscareerquestions): document the
      problems you hit and what you'd do differently. Converts a
      project from "thing I built" into "evidence of how I think".
    trigger: any
    impact: 0.7
    effort: 0.15
