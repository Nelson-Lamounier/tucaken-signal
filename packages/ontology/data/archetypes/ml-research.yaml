id: ml_research
name: "ML / Data Research"
description: >
  Notebook-heavy or experiment-driven data science / ML codebase. Depth
  lives in methodology, datasets, and reproducibility.

classification_signals:
  required_any:
    - has_notebooks
    - has_requirements_with_ml_deps
  positive:
    - has_data_dir
    - has_experiments_dir
    - has_models_dir
  negative:
    - has_iac

expected_sections:
  - hero
  - data
  - methodology
  - results
  - reproducibility

expected_artifacts:
  - readme_results_block
  - notebook_index

pillar_weights:
  authenticity: 0.25
  readability: 0.25
  system_thinking: 0.20
  production_reality: 0.15
  stage_calibration: 0.15
